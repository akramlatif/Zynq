name: Deploy Zynq to Railway

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  test-and-deploy:
    name: Test & Deploy
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install Dependencies
        run: npm ci
        working-directory: ./server

      - name: Run Tests
        run: npm run test
        working-directory: ./server
        env:
          NODE_ENV: test
          # You might need a test DB URL here if tests hit the DB
          # DATABASE_URL: ${{ secrets.TEST_DATABASE_URL }}

      - name: Build TypeScript
        run: npm run build
        working-directory: ./server

      # Optional: Verify Docker build locally before pushing
      - name: Verify Docker Build
        run: docker build -t zynq-backend ./server

      - name: Install Railway CLI
        run: npm i -g @railway/cli

      - name: Deploy to Railway
        run: railway up --detach
        working-directory: ./server
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
